<!DOCTYPE html>
<html>
<head>
<title>Heading with ID</title>
</head>

<body>

<h1 id="heading">this is a heading with an ID</h1>

<p>Maecenas congue ligula ac quam viverra nec consectetur ante hendrerit.</p>

<button id="btn">Submit Button</button>

<script>
document.getElementById("btn").onclick = function() {

    document.body.style.color = "white";

}

</script>

</body>
