<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Light Dark Mode Website</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container text-center mt-5">

<h1 class="mb-4">My Website</h1>

<button id="toggle" class="btn btn-primary mb-5">
Toggle Light / Dark Mode
</button>

</div>

<!-- Hero Section -->
<div class="container mb-5">
<h2>Hero Section</h2>
<p>Welcome to our website. This is the hero section of the page.</p>
</div>

<!-- About Us -->
<div class="container mb-5">
<h2>About Us</h2>
<p>We are a team focused on building modern web applications.</p>
</div>

<!-- Why -->
<div class="container mb-5">
<h2>Why Choose Us</h2>
<p>We provide reliable and efficient solutions.</p>
</div>

<!-- Testimonial -->
<div class="container mb-5">
<h2>Testimonial</h2>
<p>"This service is amazing and very helpful!"</p>
</div>

<!-- Footer -->
<footer class="text-center p-4">
<p>© 2026 My Website</p>
</footer>


<script>

let toggle = document.getElementById("toggle");
let darkMode = false;

toggle.onclick = function(){

if(darkMode === false){

document.body.style.backgroundColor = "black";
document.body.style.color = "white";
toggle.innerText = "Light Mode";

darkMode = true;

}

else{

document.body.style.backgroundColor = "white";
document.body.style.color = "black";
toggle.innerText = "Dark Mode";

darkMode = false;

}

}

</script>
</body>
</html>
